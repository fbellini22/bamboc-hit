<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <title>Bamboc-Hit</title>

    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- FONT -->
    <link
      href="https://fonts.googleapis.com/css2?family=Monoton&display=swap"
      rel="stylesheet"
    />

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- QR Scanner -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <!-- Spotify SDK -->
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
  </head>

  <body>
    <!-- LOGIN SCREEN -->
    <section id="login-screen" class="screen">
      <h1 class="title">Bamboc-Hit</h1>

      <button class="primary-btn" onclick="redirectToSpotifyLogin()">
        Login con Spotify
      </button>
    </section>

    <!-- GAME SCREEN -->
    <section id="game-screen" class="screen">
      <h1 class="title">Bamboc-Hit</h1>

      <!-- SCAN -->
      <button class="primary-btn" onclick="initPlayerAndScan()">SCAN</button>
      <!-- SCANNER -->
      <div class="scanner-container">
        <div id="reader"></div>
      </div>

      <!-- TIMER -->
      <div class="timer">
        <svg class="progress-ring" width="180" height="180">
          <circle class="progress-ring-bg" cx="90" cy="90" r="80" />

          <circle
            id="progress-ring-circle"
            class="progress-ring-circle"
            cx="90"
            cy="90"
            r="80"
          />
        </svg>

        <div id="countdown" class="timer-text">30</div>
      </div>

      <!-- REVEAL -->
      <button
        id="reveal-btn"
        class="primary-btn"
        onclick="revealEarly()"
        style="display: none"
      >
        REVEAL
      </button>

      <!-- RESULT -->
      <div id="result" class="card-container"></div>

      <!-- NEXT -->
      <button
        id="reset-btn"
        class="primary-btn"
        onclick="resetGame()"
        style="display: none"
      >
        NEXT SONG
      </button>

      <!-- DEBUG -->
      <div id="debug" style="margin-top: 10px; font-size: 12px"></div>
    </section>

    <!-- SCRIPTS -->

    <script src="config.js"></script>
    <script src="spotify-auth.js"></script>
    <script src="player.js"></script>
    <script src="scanner.js"></script>

    <!-- 🔥 DATI -->
    <script src="songs.js"></script>

    <!-- 🔥 LOGICA -->
    <script src="app.js"></script>
  </body>
</html>
